<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norm Ender - Kaktüs | Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="background-cover"></div>
    <div class="background-overlay"></div>

    <div class="player-container">
        <div class="album-art-container">
            <img src="kapak.jpg" alt="Norm Ender Kaktüs Albüm Kapağı" class="album-art">
        </div>

        <div class="track-info">
            <h2 class="track-name">Kaktüs</h2>
            <h3 class="artist-name">Norm Ender</h3>
        </div>

        <div class="audio-controls-container">
            <audio id="audio-player" src="kaktus.mp3"></audio>
            
            <div class="controls">
                <button class="control-btn" id="prev-btn" title="Önceki (Varsa)">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn play-pause-btn" id="play-btn" title="Oynat/Duraklat">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>
                <button class="control-btn" id="next-btn" title="Sonraki (Varsa)">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress-bar" value="0" max="100">
                <span id="duration">0:00</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
